<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irma - Virtual Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'snow': {
                            50: '#FAFAFA',
                            100: '#F5F5F5',
                            200: '#F0F0F0',
                            300: '#E8E8E8',
                            400: '#D8D8D8',
                        },
                        'irma-purple': {
                            50: '#F5F3FF',
                            100: '#EDE9FE',
                            200: '#DDD6FE',
                            300: '#C4B5FD',
                            400: '#A78BFA',
                            500: '#8B5CF6',
                            600: '#7C3AED',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #FAFAFA 0%, #F0F0F0 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .chat-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        
        .message {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        
        .gradient-text {
            background: linear-gradient(90deg, #8B5CF6 0%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .mic-button:hover {
            transform: scale(1.05);
            transition: transform 0.2s;
        }
        
        .mic-button:active {
            transform: scale(0.95);
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    
    <!-- Main Container -->
    <div class="max-w-6xl mx-auto">
        
        <!-- Header -->
        <header class="chat-container rounded-2xl p-6 mb-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-irma-purple-400 to-irma-purple-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-robot text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold gradient-text">Irma</h1>
                        <p class="text-gray-500 text-sm">Virtual Assistant</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- Language Mode Toggle -->
                    <div class="flex items-center space-x-2 bg-snow-100 rounded-full p-1">
                        <button id="mode-genz" class="px-4 py-2 rounded-full text-sm font-medium transition-all bg-irma-purple-500 text-white">
                            Gen-Z
                        </button>
                        <button id="mode-formal" class="px-4 py-2 rounded-full text-sm font-medium transition-all text-gray-600 hover:bg-snow-200">
                            Formal
                        </button>
                    </div>
                    
                    <!-- Stats Button -->
                    <button id="stats-btn" class="p-3 hover:bg-snow-100 rounded-full transition-all">
                        <i class="fas fa-chart-line text-gray-600"></i>
                    </button>
                    
                    <!-- History Button -->
                    <button id="history-btn" class="p-3 hover:bg-snow-100 rounded-full transition-all">
                        <i class="fas fa-history text-gray-600"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Main Chat Area -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Chat Messages (3/4 width) -->
            <div class="lg:col-span-3">
                <div class="chat-container rounded-2xl p-6 h-[600px] flex flex-col">
                    
                    <!-- Messages Area -->
                    <div id="messages-container" class="flex-1 overflow-y-auto space-y-4 mb-6 scrollbar-hide">
                        <!-- Welcome Message -->
                        <div class="message flex items-start space-x-3">
                            <div class="w-10 h-10 bg-gradient-to-br from-irma-purple-400 to-irma-purple-600 rounded-full flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-robot text-white"></i>
                            </div>
                            <div class="flex-1">
                                <div class="bg-snow-100 rounded-2xl rounded-tl-none p-4">
                                    <p class="text-gray-800">Halo! Aku Irma, asisten virtual kamu. Ada yang bisa aku bantuin? 😊</p>
                                    <p class="text-xs text-gray-500 mt-2">Kamu bisa ngetik atau klik tombol mic untuk bicara langsung!</p>
                                </div>
                                <span class="text-xs text-gray-400 ml-2 mt-1 inline-block">Just now</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Input Area -->
                    <div class="space-y-3">
                        <!-- Image Preview (hidden by default) -->
                        <div id="image-preview" class="hidden bg-snow-100 rounded-xl p-3">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <img id="preview-img" src="" alt="Preview" class="w-16 h-16 object-cover rounded-lg">
                                    <div>
                                        <p class="text-sm font-medium text-gray-700" id="image-name">image.jpg</p>
                                        <p class="text-xs text-gray-500">Ready to upload</p>
                                    </div>
                                </div>
                                <button id="remove-image" class="p-2 hover:bg-snow-200 rounded-full">
                                    <i class="fas fa-times text-gray-500"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Input Box -->
                        <div class="flex items-end space-x-3">
                            <!-- Text Input -->
                            <div class="flex-1 bg-snow-100 rounded-2xl p-3 flex items-end space-x-2">
                                <textarea 
                                    id="user-input" 
                                    placeholder="Ketik pesan atau klik mic untuk bicara..."
                                    rows="1"
                                    class="flex-1 bg-transparent outline-none resize-none text-gray-800 placeholder-gray-400"
                                ></textarea>
                                
                                <!-- Image Upload Button -->
                                <label for="image-upload" class="cursor-pointer p-2 hover:bg-snow-200 rounded-full transition-all">
                                    <i class="fas fa-image text-gray-500"></i>
                                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                                </label>
                            </div>
                            
                            <!-- Microphone Button -->
                            <button id="mic-btn" class="mic-button w-14 h-14 bg-gradient-to-br from-irma-purple-400 to-irma-purple-600 rounded-full flex items-center justify-center text-white shadow-lg hover:shadow-xl transition-all">
                                <i class="fas fa-microphone text-xl"></i>
                            </button>
                            
                            <!-- Send Button -->
                            <button id="send-btn" class="w-14 h-14 bg-gradient-to-br from-irma-purple-400 to-irma-purple-600 rounded-full flex items-center justify-center text-white shadow-lg hover:shadow-xl transition-all">
                                <i class="fas fa-paper-plane text-xl"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Sidebar (1/4 width) -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- Quick Actions -->
                <div class="chat-container rounded-2xl p-5">
                    <h3 class="text-sm font-semibold text-gray-700 mb-4 uppercase tracking-wide">Quick Actions</h3>
                    <div class="space-y-2">
                        <button class="quick-action w-full text-left p-3 hover:bg-snow-100 rounded-xl transition-all flex items-center space-x-3" data-action="Apa kabar?">
                            <i class="fas fa-smile text-irma-purple-500"></i>
                            <span class="text-sm text-gray-700">Apa kabar?</span>
                        </button>
                        <button class="quick-action w-full text-left p-3 hover:bg-snow-100 rounded-xl transition-all flex items-center space-x-3" data-action="Jam berapa sekarang?">
                            <i class="fas fa-clock text-irma-purple-500"></i>
                            <span class="text-sm text-gray-700">Jam berapa?</span>
                        </button>
                        <button class="quick-action w-full text-left p-3 hover:bg-snow-100 rounded-xl transition-all flex items-center space-x-3" data-action="Berapa memory yang digunakan?">
                            <i class="fas fa-memory text-irma-purple-500"></i>
                            <span class="text-sm text-gray-700">Cek memory</span>
                        </button>
                        <button class="quick-action w-full text-left p-3 hover:bg-snow-100 rounded-xl transition-all flex items-center space-x-3" data-action="Buka Google">
                            <i class="fas fa-globe text-irma-purple-500"></i>
                            <span class="text-sm text-gray-700">Buka Google</span>
                        </button>
                    </div>
                </div>
                
                <!-- System Status -->
                <div class="chat-container rounded-2xl p-5">
                    <h3 class="text-sm font-semibold text-gray-700 mb-4 uppercase tracking-wide">System Status</h3>
                    <div class="space-y-3">
                        <div>
                            <div class="flex justify-between text-xs text-gray-600 mb-1">
                                <span>CPU</span>
                                <span id="cpu-usage">0%</span>
                            </div>
                            <div class="w-full bg-snow-200 rounded-full h-2">
                                <div id="cpu-bar" class="bg-gradient-to-r from-irma-purple-400 to-irma-purple-600 h-2 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-gray-600 mb-1">
                                <span>Memory</span>
                                <span id="memory-usage">0%</span>
                            </div>
                            <div class="w-full bg-snow-200 rounded-full h-2">
                                <div id="memory-bar" class="bg-gradient-to-r from-irma-purple-400 to-irma-purple-600 h-2 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Conversation Stats -->
                <div class="chat-container rounded-2xl p-5">
                    <h3 class="text-sm font-semibold text-gray-700 mb-4 uppercase tracking-wide">Stats Today</h3>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-gray-600">Total Chats</span>
                            <span id="total-chats" class="text-lg font-bold gradient-text">0</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-gray-600">Emotions</span>
                            <span id="emotion-count" class="text-sm font-medium text-gray-700">-</span>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 flex flex-col items-center space-y-4">
            <div class="w-16 h-16 border-4 border-irma-purple-200 border-t-irma-purple-500 rounded-full animate-spin"></div>
            <p class="text-gray-700 font-medium">Processing...</p>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script>
        // Global state
        let currentMode = 'gen-z';
        let isListening = false;
        let selectedImage = null;
        
        // DOM Elements
        const messagesContainer = document.getElementById('messages-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const imageUpload = document.getElementById('image-upload');
        const imagePreview = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');
        const imageName = document.getElementById('image-name');
        const removeImageBtn = document.getElementById('remove-image');
        const modeGenzBtn = document.getElementById('mode-genz');
        const modeFormalBtn = document.getElementById('mode-formal');
        const statsBtn = document.getElementById('stats-btn');
        const historyBtn = document.getElementById('history-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const quickActionBtns = document.querySelectorAll('.quick-action');
        
        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        
        // Send message on Enter
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Send button click
        sendBtn.addEventListener('click', sendMessage);
        
        // Microphone button (placeholder - will integrate with backend)
        micBtn.addEventListener('click', function() {
            if (!isListening) {
                startListening();
            } else {
                stopListening();
            }
        });
        
        // Image upload handling
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedImage = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    imageName.textContent = file.name;
                    imagePreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Remove image
        removeImageBtn.addEventListener('click', function() {
            selectedImage = null;
            imageUpload.value = '';
            imagePreview.classList.add('hidden');
        });
        
        // Language mode toggle
        modeGenzBtn.addEventListener('click', () => changeLanguageMode('gen-z'));
        modeFormalBtn.addEventListener('click', () => changeLanguageMode('formal'));
        
        // Quick actions
        quickActionBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const action = this.dataset.action;
                userInput.value = action;
                sendMessage();
            });
        });
        
        // Stats button
        statsBtn.addEventListener('click', loadStats);
        
        // History button
        historyBtn.addEventListener('click', loadHistory);
        
        // Functions
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !selectedImage) return;
            
            // Add user message to chat
            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Show loading
            showLoading();
            
            try {
                // Send to backend
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        input: text
                    })
                });
                
                const data = await response.json();
                
                // Hide loading
                hideLoading();
                
                // Add assistant response
                if (data.success) {
                    addMessage(data.response, 'assistant', data.emotion);
                } else {
                    addMessage('Maaf, terjadi error: ' + data.error, 'assistant', 'neutral');
                }
                
                // Update stats
                updateStats();
                
            } catch (error) {
                hideLoading();
                addMessage('Error: ' + error.message, 'assistant', 'neutral');
            }
            
            // Clear image
            if (selectedImage) {
                selectedImage = null;
                imageUpload.value = '';
                imagePreview.classList.add('hidden');
            }
        }
        
        function addMessage(text, sender, emotion = 'neutral') {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message flex items-start space-x-3';
            
            if (sender === 'user') {
                messageDiv.classList.add('flex-row-reverse', 'space-x-reverse');
            }
            
            const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const emotionEmoji = {
                'senang': '😊',
                'sedih': '😢',
                'marah': '😠',
                'takut': '😰',
                'terkejut': '😲',
                'neutral': '🤖'
            };
            
            messageDiv.innerHTML = `
                <div class="w-10 h-10 ${sender === 'user' ? 'bg-gradient-to-br from-gray-400 to-gray-600' : 'bg-gradient-to-br from-irma-purple-400 to-irma-purple-600'} rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas ${sender === 'user' ? 'fa-user' : 'fa-robot'} text-white"></i>
                </div>
                <div class="flex-1 ${sender === 'user' ? 'flex flex-col items-end' : ''}">
                    <div class="${sender === 'user' ? 'bg-gradient-to-br from-irma-purple-500 to-irma-purple-600 text-white' : 'bg-snow-100 text-gray-800'} rounded-2xl ${sender === 'user' ? 'rounded-tr-none' : 'rounded-tl-none'} p-4 max-w-2xl">
                        <p class="whitespace-pre-wrap">${text}</p>
                        ${sender === 'assistant' && emotion !== 'neutral' ? `<span class="text-xs opacity-70 mt-2 inline-block">${emotionEmoji[emotion] || ''} ${emotion}</span>` : ''}
                    </div>
                    <span class="text-xs text-gray-400 ml-2 mt-1 inline-block">${time}</span>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function startListening() {
            isListening = true;
            micBtn.innerHTML = '<i class="fas fa-stop text-xl"></i>';
            micBtn.classList.add('pulse-animation');
            // TODO: Implement actual voice recognition
            alert('Voice recognition sedang dalam development. Untuk sementara gunakan text input ya!');
            stopListening();
        }
        
        function stopListening() {
            isListening = false;
            micBtn.innerHTML = '<i class="fas fa-microphone text-xl"></i>';
            micBtn.classList.remove('pulse-animation');
        }
        
        async function changeLanguageMode(mode) {
            try {
                const response = await fetch('/api/language-mode', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ mode })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentMode = mode;
                    
                    // Update button states
                    if (mode === 'gen-z') {
                        modeGenzBtn.classList.add('bg-irma-purple-500', 'text-white');
                        modeGenzBtn.classList.remove('text-gray-600');
                        modeFormalBtn.classList.remove('bg-irma-purple-500', 'text-white');
                        modeFormalBtn.classList.add('text-gray-600');
                    } else {
                        modeFormalBtn.classList.add('bg-irma-purple-500', 'text-white');
                        modeFormalBtn.classList.remove('text-gray-600');
                        modeGenzBtn.classList.remove('bg-irma-purple-500', 'text-white');
                        modeGenzBtn.classList.add('text-gray-600');
                    }
                    
                    addMessage(`Mode bahasa diubah ke ${mode === 'gen-z' ? 'Gen-Z (informal)' : 'Formal'}`, 'assistant');
                }
            } catch (error) {
                console.error('Error changing mode:', error);
            }
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.stats;
                    
                    // Update CPU
                    document.getElementById('cpu-usage').textContent = stats.cpu.percent + '%';
                    document.getElementById('cpu-bar').style.width = stats.cpu.percent + '%';
                    
                    // Update Memory
                    document.getElementById('memory-usage').textContent = stats.memory.percent + '%';
                    document.getElementById('memory-bar').style.width = stats.memory.percent + '%';
                    
                    // Update conversation stats
                    if (stats.conversation_stats) {
                        document.getElementById('total-chats').textContent = stats.conversation_stats.total || 0;
                        const emotions = stats.conversation_stats.emotions || {};
                        const emotionText = Object.keys(emotions).map(e => `${e}: ${emotions[e]}`).join(', ') || '-';
                        document.getElementById('emotion-count').textContent = emotionText;
                    }
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/conversation-history');
                const data = await response.json();
                
                if (data.success) {
                    // Clear current messages
                    messagesContainer.innerHTML = '';
                    
                    // Add history messages
                    data.history.forEach(item => {
                        if (item.user) {
                            addMessage(item.user, 'user');
                        }
                        if (item.assistant) {
                            addMessage(item.assistant, 'assistant', item.emotion || 'neutral');
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }
        
        async function updateStats() {
            await loadStats();
        }
        
        function showLoading() {
            loadingOverlay.classList.remove('hidden');
        }
        
        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }
        
        // Initial stats load
        loadStats();
        
        // Update stats every 5 seconds
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
